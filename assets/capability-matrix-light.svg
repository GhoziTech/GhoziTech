<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">GhoziTech capability matrix</title>
  <desc id="desc">Three engineering lanes: interface systems, automation systems, and delivery systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F8FBFF"/><stop offset="1" stop-color="#EDF5FF"/></linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#007FA8"/><stop offset=".5" stop-color="#6B42D8"/><stop offset="1" stop-color="#008C66"/></linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" fill="none" stroke="#CFE0F0" stroke-width=".7" opacity=".3"/></pattern>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif} .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
      .micro{font-size:9px;font-weight:750;letter-spacing:1.4px} .title{font-size:17px;font-weight:800;letter-spacing:.4px} .stack{font-size:12px;font-weight:620}
    </style>
  </defs>
  <rect x="1" y="1" width="1198" height="328" rx="22" fill="url(#bg)" stroke="#C5D5E6"/>
  <rect x="1" y="1" width="1198" height="328" rx="22" fill="url(#grid)"/>
  <text x="36" y="43" class="micro mono" fill="#007FA8">CAPABILITY MATRIX</text>
  <text x="36" y="68" font-family="Inter,Segoe UI,Arial" font-size="23" font-weight="800" fill="#0A1730">Three lanes. One delivery standard.</text>
  <text x="1164" y="51" text-anchor="end" class="micro mono" fill="#71839A">03 ACTIVE CHANNELS</text>
  <line x1="36" y1="82" x2="1164" y2="82" stroke="url(#lineGrad)" stroke-width="1.2" stroke-dasharray="80 1048"><animate attributeName="stroke-dashoffset" from="0" to="-1128" dur="8s" repeatCount="indefinite"/></line>
  
        <g transform="translate(36 94)">
          <rect width="342" height="202" rx="18" fill="#FFFFFF" stroke="#C5D5E6"/>
          <rect x="18" y="18" width="46" height="24" rx="12" fill="#007FA8" fill-opacity=".1" stroke="#007FA8" stroke-opacity=".45"/>
          <text x="41" y="34" text-anchor="middle" class="micro mono" fill="#007FA8">01</text>
          <circle cx="304" cy="30" r="5" fill="#007FA8"><animate attributeName="opacity" values=".25;1;.25" dur="1.8s" repeatCount="indefinite"/></circle>
          <text x="20" y="76" class="title" fill="#0A1730">INTERFACE SYSTEMS</text>
          <text x="20" y="107" class="stack" fill="#4B6179">React · TypeScript · Three.js · GSAP</text>
          <line x1="20" y1="130" x2="320" y2="130" stroke="#B8CCE2"/>
          <text x="20" y="155" class="micro mono" fill="#71839A">CINEMATIC UI / RESPONSIVE / 3D</text>
          <rect x="20" y="174" width="302" height="5" rx="2.5" fill="#E9F3FF"/>
          <rect x="20" y="174" width="0" height="5" rx="2.5" fill="#007FA8">
            <animate attributeName="width" values="0;248;248" begin="0.7s" dur="2.4s" fill="freeze"/>
          </rect>
        </g>
        <g transform="translate(414 94)">
          <rect width="342" height="202" rx="18" fill="#FFFFFF" stroke="#C5D5E6"/>
          <rect x="18" y="18" width="46" height="24" rx="12" fill="#6B42D8" fill-opacity=".1" stroke="#6B42D8" stroke-opacity=".45"/>
          <text x="41" y="34" text-anchor="middle" class="micro mono" fill="#6B42D8">02</text>
          <circle cx="304" cy="30" r="5" fill="#6B42D8"><animate attributeName="opacity" values=".25;1;.25" dur="2.2s" repeatCount="indefinite"/></circle>
          <text x="20" y="76" class="title" fill="#0A1730">AUTOMATION SYSTEMS</text>
          <text x="20" y="107" class="stack" fill="#4B6179">Node.js · Python · APIs · WhatsApp</text>
          <line x1="20" y1="130" x2="320" y2="130" stroke="#B8CCE2"/>
          <text x="20" y="155" class="micro mono" fill="#71839A">WORKFLOWS / BOTS / BUSINESS LOGIC</text>
          <rect x="20" y="174" width="302" height="5" rx="2.5" fill="#E9F3FF"/>
          <rect x="20" y="174" width="0" height="5" rx="2.5" fill="#6B42D8">
            <animate attributeName="width" values="0;231;231" begin="0.95s" dur="2.4s" fill="freeze"/>
          </rect>
        </g>
        <g transform="translate(792 94)">
          <rect width="342" height="202" rx="18" fill="#FFFFFF" stroke="#C5D5E6"/>
          <rect x="18" y="18" width="46" height="24" rx="12" fill="#008C66" fill-opacity=".1" stroke="#008C66" stroke-opacity=".45"/>
          <text x="41" y="34" text-anchor="middle" class="micro mono" fill="#008C66">03</text>
          <circle cx="304" cy="30" r="5" fill="#008C66"><animate attributeName="opacity" values=".25;1;.25" dur="2.6s" repeatCount="indefinite"/></circle>
          <text x="20" y="76" class="title" fill="#0A1730">DELIVERY SYSTEMS</text>
          <text x="20" y="107" class="stack" fill="#4B6179">Git · GitHub Actions · Docker · Vite</text>
          <line x1="20" y1="130" x2="320" y2="130" stroke="#B8CCE2"/>
          <text x="20" y="155" class="micro mono" fill="#71839A">BUILD / TEST / DEPLOY / OBSERVE</text>
          <rect x="20" y="174" width="302" height="5" rx="2.5" fill="#E9F3FF"/>
          <rect x="20" y="174" width="0" height="5" rx="2.5" fill="#008C66">
            <animate attributeName="width" values="0;214;214" begin="1.2s" dur="2.4s" fill="freeze"/>
          </rect>
        </g>
</svg>