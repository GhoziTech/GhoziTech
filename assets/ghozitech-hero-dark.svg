<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">GhoziTech animated identity reactor profile banner</title>
  <desc id="desc">Animated GitHub profile banner for Hafid Ghozi Al Ghifari, creative frontend developer and AI automation builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070D"/>
      <stop offset=".55" stop-color="#081323"/>
      <stop offset="1" stop-color="#05070D"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36E4FF"/>
      <stop offset=".5" stop-color="#9D7BFF"/>
      <stop offset="1" stop-color="#48F0B0"/>
      <animate attributeName="x1" values="-.25;.25;-.25" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values=".75;1.25;.75" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="coreGlow">
      <stop offset="0" stop-color="#36E4FF" stop-opacity=".44"/>
      <stop offset=".5" stop-color="#9D7BFF" stop-opacity=".13"/>
      <stop offset="1" stop-color="#9D7BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientA"><stop stop-color="#36E4FF" stop-opacity=".24"/><stop offset="1" stop-color="#36E4FF" stop-opacity="0"/></radialGradient>
    <radialGradient id="ambientB"><stop stop-color="#9D7BFF" stop-opacity=".20"/><stop offset="1" stop-color="#9D7BFF" stop-opacity="0"/></radialGradient>
    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#17314B" stroke-width=".7" opacity=".34"/>
    </pattern>
    <filter id="glowCyan" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity=".25"/></filter>
    <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" seed="9"/><feColorMatrix type="saturate" values="0"/></filter>
    <clipPath id="clipName"><rect x="636" y="145" width="476" height="58" rx="4"><animate attributeName="width" from="0" to="476" begin=".75s" dur="1.15s" fill="freeze"/></rect></clipPath>
    <clipPath id="clipRole"><rect x="636" y="210" width="448" height="33"><animate attributeName="width" from="0" to="448" begin="1.55s" dur="1.05s" fill="freeze"/></rect></clipPath>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif;letter-spacing:.2px}
      .mono{font-family:ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .eyebrow{font-size:11px;font-weight:700;letter-spacing:2.2px}
      .name{font-size:39px;font-weight:800;letter-spacing:-1px}
      .role{font-size:16px;font-weight:700;letter-spacing:1.5px}
      .small{font-size:12px}
      .micro{font-size:9px;letter-spacing:1.45px;font-weight:700}
      .chip-text{font-size:10px;font-weight:750;letter-spacing:.75px}
      .node-abbr{font-size:12px;font-weight:800}
      .node-label{font-size:8px;font-weight:700;letter-spacing:1px}
      @media (prefers-reduced-motion: reduce){*{animation:none!important}}
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="618" rx="24" fill="url(#bg)" stroke="#29425E"/>
  <rect x="1" y="1" width="1198" height="618" rx="24" fill="url(#microGrid)" opacity=".7"/>
  <ellipse cx="130" cy="72" rx="350" ry="260" fill="url(#ambientA)"><animate attributeName="opacity" values=".55;.95;.55" dur="8s" repeatCount="indefinite"/></ellipse>
  <ellipse cx="1130" cy="520" rx="400" ry="300" fill="url(#ambientB)"><animate attributeName="opacity" values=".5;.9;.5" dur="10s" begin="-2s" repeatCount="indefinite"/></ellipse>
  <rect x="0" y="0" width="1200" height="620" rx="24" filter="url(#noise)" opacity=".028"/>
  <circle cx="62" cy="84" r="1.5" fill="#36E4FF" opacity=".35">
          <animate attributeName="opacity" values=".12;.65;.12" dur="3.5s" begin="0.0s" repeatCount="indefinite"/>
