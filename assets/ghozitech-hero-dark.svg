          <animate attributeName="opacity" values=".12;.65;.12" dur="4.2s" begin="-1.55s" repeatCount="indefinite"/>
        </circle><circle cx="1136" cy="182" r="1.5" fill="#36E4FF" opacity=".35">
          <animate attributeName="opacity" values=".12;.65;.12" dur="4.9s" begin="-1.8599999999999999s" repeatCount="indefinite"/>
        </circle><circle cx="1012" cy="548" r="1" fill="#9D7BFF" opacity=".35">
          <animate attributeName="opacity" values=".12;.65;.12" dur="5.6s" begin="-2.17s" repeatCount="indefinite"/>
        </circle><circle cx="933" cy="77" r="1" fill="#48F0B0" opacity=".35">
          <animate attributeName="opacity" values=".12;.65;.12" dur="3.5s" begin="-2.48s" repeatCount="indefinite"/>
        </circle><circle cx="711" cy="556" r="1.3" fill="#36E4FF" opacity=".35">
          <animate attributeName="opacity" values=".12;.65;.12" dur="4.2s" begin="-2.79s" repeatCount="indefinite"/>
